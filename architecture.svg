  <text x="160" y="558" fill="#8b949e" font-size="9" text-anchor="middle">网易云搜索</text>

  <rect x="310" y="522" width="200" height="52" rx="6" fill="#1c2128" stroke="#8b949e" stroke-width="1.2"/>
