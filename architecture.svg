  <text x="300" y="308" fill="#6e7681" font-size="8" text-anchor="middle">记忆注入/Skills</text>

  <rect x="490" y="258" width="140" height="72" rx="6" fill="#1a4731" fill-opacity="0.4" stroke="#3fb950" stroke-width="1.2"/>
