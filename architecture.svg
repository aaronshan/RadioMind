  <text x="410" y="558" fill="#8b949e" font-size="9" text-anchor="middle">Open-Meteo</text>

  <rect x="560" y="522" width="240" height="52" rx="6" fill="#1c2128" stroke="#8b949e" stroke-width="1.2"/>
